<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesa Central - HS Taekwondo</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            padding: 10px; 
            text-align: center; 
            user-select: none; 
            -webkit-user-select: none; 
            touch-action: manipulation;
        }
        .header {
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .panel-central { 
            background: #2a2a2a; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            position: relative;
        }
        .panel-config {
            background: #333;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .config-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .config-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .panel-config input {
            background: #222;
            color: #ffcc00;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            width: 45px;
            text-align: center;
            font-family: monospace;
        }
        .btn-aplicar {
            background: #007bff;
            color: white;
            border: none;
            padding: 6px 15px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn-aplicar:active { background: #0056b3; }
        
        #tiempo { 
            font-size: 55px; 
            font-weight: bold; 
            color: #00ffcc; 
            font-family: monospace; 
            line-height: 1.1;
        }
        #round { 
            font-size: 16px; 
            color: #ffcc00; 
            font-weight: bold; 
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .contenedor { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 12px; 
        }
        .box { 
            flex: 1; 
            padding: 15px 5px; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .azul { background: #0055ff; } 
        .rojo { background: #ff3333; }
        .pts { 
            font-size: 65px; 
            font-weight: bold; 
            font-family: monospace; 
            line-height: 1;
            margin: 5px 0;
        }
        .luces { 
            font-size: 22px; 
            color: #ffcc00; 
            letter-spacing: 3px; 
        }
        .rounds-ganados {
            font-size: 12px;
            margin-top: 5px;
            background: rgba(255,255,255,0.15);
            padding: 3px;
            border-radius: 5px;
        }
        button { 
            background: #444; 
            color: white; 
            border: none; 
            padding: 12px 5px; 
            font-size: 12px; 
            font-weight: bold; 
            border-radius: 6px; 
            flex: 1; 
        }
        .btn-play { 
            background: #28a745; 
            font-size: 15px; 
            padding: 14px; 
            font-weight: bold;
        }
        .btn-az { background: #0044cc; border: 1px solid #0055ff; } 
        .btn-rj { background: #cc2222; border: 1px solid #ff3333; }
        
        .bloqueado {
            opacity: 0.25;
            pointer-events: none; 
        }
        .aviso-bloqueo {
            display: none;
            color: #ff3333;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        @keyframes titilar { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .ganador-titilo { animation: titilar 0.6s infinite ease-in-out; border: 4px solid #ffcc00; }

        .pantalla-ganador {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold;
        }
        .pantalla-ganador.pantalla-azul { background: #0044cc; }
        .pantalla-ganador.pantalla-rojo { background: #cc1111; }
        .pantalla-ganador h1 { font-size: 45px; margin: 0; }
