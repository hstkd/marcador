<!DOCTYPE html>
<html><head><script src="/socket.io/socket.io.js"></script>
<style>body{background:#222; color:white; text-align:center; font-family:Arial;} button{padding:20px; font-size:20px;}</style></head>
<body>
    <h1>Mesa Central</h1>
    <input type="number" id="tiempo" value="120"> 
    <button onclick="socket.emit('configurarTiempos', {tiempo: document.getElementById('tiempo').value})">ESTABLECER</button>
    <h1 id="reloj" style="font-size:80px;">02:00</h1>
    <button onclick="socket.emit('toggleTiempo')">INICIAR / PAUSAR</button>
    <script>
        const socket = io();
        socket.on('actualizar', (e) => {
            let m = Math.floor(e.tiempoRestante/60), s = e.tiempoRestante%60;
            document.getElementById('reloj').innerText = m+":"+(s<10?'0':'')+s;
        });
    </script>
</body></html>
