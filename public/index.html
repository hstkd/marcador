<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mesa Central - HS Taekwondo</title>
    <style>
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #login-overlay input { padding: 15px; font-size: 18px; margin-bottom: 10px; border-radius: 8px; border: none; text-align: center; }
        #login-overlay button { padding: 15px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }

        body { background: #1a1a1a; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 10px; text-align: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .header { font-size: 14px; font-weight: bold; color: #aaa; margin-bottom: 8px; letter-spacing: 1px; }
        .panel-central { background: #2a2a2a; padding: 12px; border-radius: 12px; margin-bottom: 12px; position: relative; }
        .panel-config { background: #333; padding: 12px; border-radius: 8px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .config-row { display: flex; gap: 15px; justify-content: center; align-items: center; width: 100%; }
        .config-group { display: flex; align-items: center; gap: 4px; }
        .panel-config input { background: #222; color: #ffcc00; border: 1px solid #555; padding: 6px; border-radius: 4px; font-size: 14px; font-weight: bold; width: 45px; text-align: center; font-family: monospace; }
        .btn-aplicar { background: #007bff; color: white; border: none; padding: 6px 15px; font-size: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 4px; }
        #tiempo { font-size: 55px; font-weight: bold; color: #00ffcc; font-family: monospace; line-height: 1.1; }
        #round { font-size: 16px; color: #ffcc00; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .contenedor { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .box { flex: 1; padding: 15px 5px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .azul { background: #0055ff; } .rojo { background: #ff3333; }
        .pts { font-size: 65px; font-weight: bold; font-family: monospace; line-height: 1; margin: 5px 0; }
        .luces { font-size: 22px; color: #ffcc00; letter-spacing: 3px; }
        .rounds-ganados { font-size: 12px; margin-top: 5px; background: rgba(255,255,255,0.15); padding: 3px; border-radius: 5px; }
        button { background: #444; color: white; border: none; padding: 12px 5px; font-size: 12px; font-weight: bold; border-radius: 6px; flex: 1; }
        .btn-play { background: #28a745; font-size: 15px; padding: 14px; font-weight: bold; }
        .btn-az { background: #0044cc; border: 1px solid #0055ff; } 
        .btn-rj { background: #cc2222; border: 1px solid #ff3333; }
        .bloqueado { opacity: 0.25; pointer-events: none; }
        .aviso-bloqueo { display: none; color: #ff3333; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        @keyframes titilar { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .ganador-titilo { animation: titilar 0.6s infinite ease-in-out; border: 4px solid #ffcc00; }
        .pantalla-ganador { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; font-weight: bold; }
        .pantalla-azul { background: #0044cc; } .pantalla-rojo { background: #cc1111; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color:white;">Acceso Mesa Central</h2>
        <input type="password" id="pass-mesa" placeholder="Contraseña">
        <button onclick="autenticar()">INGRESAR</button>
    </div>

    <div id="cartel-ganador" class="pantalla-ganador">
        <h1 id="texto-ganador">GANADOR</h1>
        <button onclick="reiniciarTodo()" style="margin-top:30px; max-width:200px; padding:15px; font-size:16px; background:#fff; color:#111;">NUEVO COMBATE</button>
    </div>

    <div class="header">HENRY SIGCHOS TAEKWONDO</div>

    <div id="panel-configuracion" class="panel-config">
        <div class="config-row">
            <div><label style="font-size:11px; font-weight:bold;">TIEMPO ROUND:</label>
                <div class="config-group"><input type="number" id="cfg-round-min" value="2"><span>:</span><input type="number" id="cfg-round-seg" value="00"></div>
            </div>
            <div><label style="font-size:11px; font-weight:bold;">TIEMPO DESCANSO:</label>
                <div class="config-group"><input type="number" id="cfg-descanso-min" value="1"><span>:</span><input type="number" id="cfg-descanso-seg" value="00"></div>
            </div>
        </div>
        <button class="btn-aplicar" onclick="aplicarConfiguracion()">Establecer Tiempos</button>
    </div>
    
    <div class="panel-central">
        <div id="round">ROUND 1</div>
        <div id="tiempo">02:00</div>
        <button id="btn-control" class="btn-play" onclick="controlTiempo()" style="width:100%; margin-top:10px;">INICIAR</button>
    </div>

    <div class="contenedor">
        <div id="box-azul" class="box azul"><div style="font-weight:bold; font-size:16px;">CHONG</div><div id="pts-azul" class="pts">0</div><div id="gam-azul" class="luces">○○○○○</div><div id="rd-azul" class="rounds-ganados">Rounds: 0</div></div>
        <div id="box-rojo" class="box rojo"><div style="font-weight:bold; font-size:16px;">HONG</div><div id="pts-rojo" class="pts">0</div><div id="gam-rojo" class="luces">○○○○○</div><div id="rd-rojo" class="rounds-ganados">Rounds: 0</div></div>
    </div>

    <div class="panel-central">
        <div id="aviso-mesa" class="aviso-bloqueo">Mesa bloqueada: Pausa el tiempo</div>
        <div id="controles-manuales">
            <div class="contenedor"><button class="btn-az" onclick="sumarMesa('azul',2)">+2 Peto</button><button class="btn-az" onclick="sumarMesa('azul',3)">+3 Cab.</button><button class="btn-az" onclick="gamjeom('azul')">+1 Gam</button></div>
            <div class="contenedor"><button class="btn-rj" onclick="sumarMesa('rojo',2)">+2 Peto</button><button class="btn-rj" onclick="sumarMesa('rojo',3)">+3 Cab.</button><button class="btn-rj" onclick="gamjeom('rojo')">+1 Gam</button></div>
        </div>
        <button onclick="reiniciarTodo()" style="background:#555; width:100%; margin-top:5px; padding:10px;">Resetear</button>
    </div>

    <script>
        const socket = io();
        function autenticar() {
            socket.emit('autenticar', { tipo: 'mesa', pass: document.getElementById('pass-mesa').value });
        }
        socket.on('authStatus', (res) => { if(res.ok) document.getElementById('login-overlay').style.display = 'none'; else alert("Clave Incorrecta"); });

        socket.on('actualizar', (estado) => {
            let mins = Math.floor(estado.tiempoRestante / 60);
            let segs = estado.tiempoRestante % 60;
            document.getElementById('tiempo').innerText = (mins < 10 ? "0" : "") + mins + ":" + (segs < 10 ? "0" : "") + segs;
            document.getElementById('panel-configuracion').style.display = (estado.roundActual > 1 || estado.corriendo) ? 'none' : 'flex';
            document.getElementById('controles-manuales').className = (estado.corriendo) ? 'bloqueado' : '';
            document.getElementById('aviso-mesa').style.display = (estado.corriendo) ? 'block' : 'none';
            document.getElementById('pts-azul').innerText = estado.puntosAzul;
            document.getElementById('pts-rojo').innerText = estado.puntosRojo;
            document.getElementById('rd-azul').innerText = "Rounds: " + estado.roundsAzul;
            document.getElementById('rd-rojo').innerText = "Rounds: " + estado.roundsRojo;
            let lAz = "", lRj = "";
            for(let i=0; i<5; i++) { lAz += (i < estado.gamjeomAzul) ? "●" : "○"; lRj += (i < estado.gamjeomRojo) ? "●" : "○"; }
            document.getElementById('gam-azul').innerText = lAz;
            document.getElementById('gam-rojo').innerText = lRj;
            document.getElementById('cartel-ganador').style.display = estado.ganadorCombate ? 'flex' : 'none';
            if(estado.ganadorCombate) document.getElementById('texto-ganador').innerText = "GANADOR " + estado.ganadorCombate.toUpperCase();
        });

        function aplicarConfiguracion() {
            socket.emit('configurarTiempos', { 
                tiempoRound: (parseInt(document.getElementById('cfg-round-min').value)*60) + parseInt(document.getElementById('cfg-round-seg').value), 
                tiempoDescanso: (parseInt(document.getElementById('cfg-descanso-min').value)*60) + parseInt(document.getElementById('cfg-descanso-seg').value)
            });
        }
        function controlTiempo() { socket.emit('toggleTiempo'); }
        function sumarMesa(c, cant) { socket.emit('modificarMesa', {competidor: c, cantidad: cant}); }
        function gamjeom(c) { socket.emit('gamjeomMesa', {competidor: c}); }
        function reiniciarTodo() { socket.emit('reiniciarTodo'); }
    </script>
</body>
</html>
