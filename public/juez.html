<!DOCTYPE html>
<html><head><script src="/socket.io/socket.io.js"></script>
<style>button{width:45%; height:150px; font-size:30px; margin:5px;}</style></head>
<body>
    <select id="idJuez"><option value="1">Juez 1</option><option value="2">Juez 2</option></select>
    <button onclick="socket.emit('registrarJuez', document.getElementById('idJuez').value)">BLOQUEAR</button>
    <div id="controles" style="display:none;">
        <button onclick="votar('azul', 'peto')" style="background:blue; color:white;">AZUL</button>
        <button onclick="votar('rojo', 'peto')" style="background:red; color:white;">ROJO</button>
    </div>
    <script>
        const socket = io();
        socket.on('juezRegistrado', (ok) => { if(ok) document.getElementById('controles').style.display='block'; else alert('Ocupado'); });
        function votar(c, t) { socket.emit('clickJuez', {competidor:c, tecnica:t, idJuez:document.getElementById('idJuez').value}); }
    </script>
</body></html>
