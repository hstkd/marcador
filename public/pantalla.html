<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Oficial - HS Taekwondo</title>
    <style>
        body { 
            background: #111; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            user-select: none;
        }

        /* LOGO / ENCABEZADO SUPERIOR */
        .header-publico {
            background: #1e1e1e;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
            border-bottom: 3px solid #333;
            text-transform: uppercase;
        }

        /* CONTENEDOR PRINCIPAL REPARTIDO EN PANTALLA */
        .marcador-global {
            display: flex;
            flex: 1;
            width: 100%;
            height: calc(100vh - 140px); /* Resta espacio de header y footer */
        }

        /* COLUMNAS DE COMPETIDORES */
        .lado {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: background 0.3s ease;
        }
        .lado-azul { background: #0044cc; }
        .lado-rojo { background: #cc1111; }

        .nombre-competidor {
            font-size: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .puntos-gigantes {
            font-size: 220px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
            margin: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        /* SECCIÓN GAM-JEOM DENTRO DE CADA LADO */
        .gamjeom-contenedor {
            margin-top: 20px;
            text-align: center;
        }
        .gamjeom-titulo {
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .gamjeom-luces {
            font-size: 45px;
            color: #ffcc00;
            letter-spacing: 8px;
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* PANEL CENTRAL: RELOJ Y ROUNDS */
        .centro {
            flex: 0.9;
            background: #151515;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-left: 4px solid #222;
            border-right: 4px solid #222;
        }

        #round-central {
            font-size: 32px;
            font-weight: 800;
            color: #ffcc00;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        #tiempo-central {
            font-size: 95px;
            font-weight: 900;
            color: #00ffcc;
            font-family: monospace;
            line-height: 1;
            background: #000;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: inset 0 0 20px rgba(0,255,204,0.2), 0 8px 16px rgba(0,0,0,0.5);
        }

        .rounds-ganados-contenedor {
            display: flex;
            width: 90%;
            justify-content: space-around;
            margin-top: 50px;
        }
        .rd-marcador {
            font-size: 20px;
            font-weight: bold;
            color: #aaa;
            background: #252525;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        /* BARRA INFERIOR / FOOTER */
        .footer-publico {
            background: #1e1e1e;
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            color: #666;
            font-weight: bold;
            border-top: 3px solid #333;
        }

        /* ANIMACIÓN PARA EL GANADOR DEL ROUND */
        @keyframes titilarPublico {
            0% { background-color: inherit; }
            50% { background-color: #ffcc00; color: #000; }
            100% { background-color: inherit; }
        }
        .lado-azul.titilo-activo { animation: titilarPublico 0.7s infinite ease-in-out; }
        .lado-rojo.titilo-activo { animation: titilarPublico 0.7s infinite ease-in-out; }

        /* PANTALLA COMPLETA FIN DE COMBATE */
        .pantalla-ganador-completa {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 99999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .pantalla-ganador-completa.g-azul { background: #0044cc; }
        .pantalla-ganador-completa.g-rojo { background: #cc1111; }
        .pantalla-ganador-completa h1 { font-size: 80px; margin: 0; font-weight: 900; letter-spacing: 3px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .pantalla-ganador-completa h2 { font-size: 40px; color: #ffcc00; margin-top: 20px; font-weight: bold; letter-spacing: 2px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- PANTALLA GIGANTE FIN DE COMBATE -->
    <div id="pantalla-fin" class="pantalla-ganador-completa">
        <h1 id="texto-fin-ganador">GANADOR CHONG (AZUL)</h1>
        <h2>FIN DEL COMBATE</h2>
    </div>

    <!-- ENCABEZADO -->
    <div class="header-publico">HENRY SIGCHOS TAEKWONDO</div>

    <!-- MARCADOR PRINCIPAL -->
    <div class="marcador-global">
        
         <!-- ROJO (HONG) -->
        <div id="lado-rojo" class="lado lado-rojo">
            <div class="nombre-competidor">HONG</div>
            <div id="puntos-rojo" class="puntos-gigantes">0</div>
            <div class="gamjeom-contenedor">
                <div class="gamjeom-titulo">GAM-JEOM</div>
                <div id="gamjeom-rojo" class="gamjeom-luces">○○○○○</div>
            </div>
        </div>
    
        <!-- CENTRO (RELOJ Y ROUNDS) -->
        <div class="centro">
            <div id="round-central">ROUND 1</div>
            <div id="tiempo-central">02:00</div>
            
            <div class="rounds-ganados-contenedor">
                <div id="rounds-azul" class="rd-marcador">ROUNDS: 0</div>
                <div id="rounds-rojo" class="rd-marcador">ROUNDS: 0</div>
            </div>
        </div>

        <!-- AZUL (CHONG) -->
        <div id="lado-azul" class="lado lado-azul">
            <div class="nombre-competidor">CHONG</div>
            <div id="puntos-azul" class="puntos-gigantes">0</div>
            <div class="gamjeom-contenedor">
                <div class="gamjeom-titulo">GAM-JEOM</div>
                <div id="gamjeom-azul" class="gamjeom-luces">○○○○○</div>
            </div>
        </div>

    </div>

    <!-- PIE DE PANTALLA -->
    <div class="footer-publico">SISTEMA ELECTRÓNICO DE ARBITRAJE INALÁMBRICO</div>

    <script>
        const socket = io();

        socket.on('actualizar', (estado) => {
            // 1. Reloj central
            let mins = Math.floor(estado.tiempoRestante / 60);
            let segs = estado.tiempoRestante % 60;
            document.getElementById('tiempo-central').innerText = (mins < 10 ? "0" : "") + mins + ":" + (segs < 10 ? "0" : "") + segs;
            
            // 2. Control de color del reloj en descanso
            if(estado.enDescanso) {
                document.getElementById('round-central').innerText = "DESCANSO";
                document.getElementById('tiempo-central').style.color = "#ffcc00";
            } else {
                document.getElementById('round-central').innerText = "ROUND " + estado.roundActual;
                document.getElementById('tiempo-central').style.color = "#00ffcc";
            }

            // 3. Puntos gigantes
            document.getElementById('puntos-azul').innerText = estado.puntosAzul;
            document.getElementById('puntos-rojo').innerText = estado.puntosRojo;

            // 4. Conteo de rounds en el centro
            document.getElementById('rounds-azul').innerText = "ROUNDS: " + estado.roundsAzul;
            document.getElementById('rounds-rojo').innerText = "ROUNDS: " + estado.roundsRojo;

            // 5. Renderizar luces Gam-jeom gigantes
            let lAz = ""; let lRj = "";
            for(let i=0; i<5; i++) { 
                lAz += (i < estado.gamjeomAzul) ? "●" : "○"; 
                lRj += (i < estado.gamjeomRojo) ? "●" : "○"; 
            }
            document.getElementById('gamjeom-azul').innerText = lAz;
            document.getElementById('gamjeom-rojo').innerText = lRj;

            // 6. Efecto de titileo al ganar un round
            const lAzul = document.getElementById('lado-azul');
            const lRojo = document.getElementById('lado-rojo');
            lAzul.classList.remove('titilo-activo');
            lRojo.classList.remove('titilo-activo');

            if (estado.ganadorRound === 'azul') lAzul.classList.add('titilo-activo');
            if (estado.ganadorRound === 'rojo') lRojo.classList.add('titilo-activo');

            // 7. Cartel completo de Fin de Combate
            const pantallaFin = document.getElementById('pantalla-fin');
            if (estado.ganadorCombate) {
                pantallaFin.style.display = 'flex';
                pantallaFin.className = 'pantalla-ganador-completa g-' + estado.ganadorCombate;
                document.getElementById('texto-fin-ganador').innerText = "GANADOR " + (estado.ganadorCombate === 'azul' ? "CHONG (AZUL)" : "HONG (ROJO)");
            } else {
                pantallaFin.style.display = 'none';
            }
        });
    </script>
</body>
</html>
