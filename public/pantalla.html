<!DOCTYPE html>
<html><head><script src="/socket.io/socket.io.js"></script></head>
<body style="background:black; color:yellow; text-align:center; font-size:150px;">
    <div id="reloj">02:00</div>
    <div style="display:flex; justify-content:space-between; color:white;">
        <div>AZUL: <span id="pA">0</span></div>
        <div>ROJO: <span id="pR">0</span></div>
    </div>
    <script>
        const socket = io();
        socket.on('actualizar', (e) => {
            let m = Math.floor(e.tiempoRestante/60), s = e.tiempoRestante%60;
            document.getElementById('reloj').innerText = m+":"+(s<10?'0':'')+s;
            document.getElementById('pA').innerText = e.puntosAzul;
            document.getElementById('pR').innerText = e.puntosRojo;
        });
    </script>
</body></html>
